<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Riwayat Transaksi - NusaStore</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/history.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="main-header history-header">
            <div class="header-left">
                <button class="icon-btn back-btn" onclick="goToPage('../index.html')"><i class="fas fa-arrow-left"></i></button>
                <div class="logo-container">
                    <span class="logo-name">Riwayat Transaksi</span>
                </div>
            </div>
        </header>

        <!-- Stats -->
        <section class="history-stats">
            <div class="stat-card">
                <i class="fas fa-shopping-bag"></i>
                <div class="stat-info">
                    <span class="stat-num" id="totalOrders">0</span>
                    <span class="stat-label">Total Pesanan</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div class="stat-info">
                    <span class="stat-num" id="completedOrders">0</span>
                    <span class="stat-label">Selesai</span>
                </div>
            </div>
            <div class="stat-card">
                <i class="fas fa-clock"></i>
                <div class="stat-info">
                    <span class="stat-num" id="pendingOrders">0</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>
        </section>

        <!-- Filter -->
        <section class="filter-section">
            <div class="filter-scroll">
                <button class="filter-btn active" data-filter="all"><i class="fas fa-th-large"></i> Semua</button>
                <button class="filter-btn" data-filter="pending"><i class="fas fa-clock"></i> Pending</button>
                <button class="filter-btn" data-filter="completed"><i class="fas fa-check"></i> Selesai</button>
            </div>
        </section>

        <!-- Transaction List -->
        <section class="transaction-section">
            <div class="section-header">
                <h2><i class="fas fa-list"></i> Daftar Transaksi</h2>
            </div>
            <div class="transaction-list" id="transactionList">
                <!-- Filled by JS -->
            </div>
            <div class="empty-state" id="emptyState" style="display:none;">
                <i class="fas fa-receipt"></i>
                <p>Belum ada transaksi</p>
            </div>
        </section>

        <!-- Bottom Spacer -->
        <div style="height: 100px;"></div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="../index.html" class="nav-item">
                <i class="fas fa-home"></i>
                <span>Beranda</span>
            </a>
            <a href="roblox.html" class="nav-item">
                <i class="fas fa-cube"></i>
                <span>Roblox</span>
            </a>
            <a href="freefire.html" class="nav-item">
                <i class="fas fa-fire"></i>
                <span>Free Fire</span>
            </a>
            <a href="mobilelegends.html" class="nav-item">
                <i class="fas fa-chess-knight"></i>
                <span>MLBB</span>
            </a>
            <a href="history.html" class="nav-item active">
                <i class="fas fa-history"></i>
                <span>Riwayat</span>
            </a>
        </nav>

        <!-- Toast -->
        <div id="toast" class="toast">
            <i class="fas fa-check-circle"></i>
            <span id="toastMsg">Berhasil!</span>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/history.js"></script>
</body>
</html>
