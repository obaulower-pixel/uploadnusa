<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - NusaStore</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="main-header">
            <div class="header-left">
                <button class="icon-btn back-btn" onclick="goToPage('../index.html')"><i class="fas fa-arrow-left"></i></button>
                <div class="logo-container">
                    <div class="logo-icon"><i class="fas fa-store"></i></div>
                    <span class="logo-name">NusaStore</span>
                </div>
            </div>
        </header>

        <!-- Auth Container -->
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <i class="fas fa-store"></i>
                    </div>
                    <h1>Selamat Datang</h1>
                    <p>Login atau daftar untuk melanjutkan</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="loginEmail" placeholder="Masukkan email Anda" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input">
                            <input type="password" id="loginPassword" placeholder="Masukkan password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="auth-btn">
                        <i class="fas fa-sign-in-alt"></i> Masuk
                    </button>
                    <div class="auth-divider">
                        <span>atau</span>
                    </div>
                    <button type="button" class="auth-btn secondary" onclick="showRegister()">
                        <i class="fas fa-user-plus"></i> Buat Akun Baru
                    </button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form" style="display:none;">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nama Lengkap</label>
                        <input type="text" id="regName" placeholder="Masukkan nama Anda" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="regEmail" placeholder="Masukkan email Anda" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Nomor WA (Opsional)</label>
                        <input type="tel" id="regPhone" placeholder="Contoh: 08123456789">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <div class="password-input">
                            <input type="password" id="regPassword" placeholder="Buat password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('regPassword')"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Konfirmasi Password</label>
                        <div class="password-input">
                            <input type="password" id="regConfirm" placeholder="Ulangi password" required>
                            <button type="button" class="toggle-password" onclick="togglePassword('regConfirm')"><i class="fas fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="auth-btn">
                        <i class="fas fa-user-plus"></i> Daftar Sekarang
                    </button>
                    <div class="auth-divider">
                        <span>atau</span>
                    </div>
                    <button type="button" class="auth-btn secondary" onclick="showLogin()">
                        <i class="fas fa-sign-in-alt"></i> Sudah Punya Akun
                    </button>
                </form>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="toast">
            <i class="fas fa-check-circle"></i>
            <span id="toastMsg">Berhasil!</span>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        // Get redirect URL
        const urlParams = new URLSearchParams(window.location.search);
        let redirectUrl = urlParams.get('redirect') || '../index.html';

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        function showLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const btn = input.parentElement.querySelector('.toggle-password i');
            if (input.type === 'password') {
                input.type = 'text';
                btn.classList.remove('fa-eye');
                btn.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                btn.classList.remove('fa-eye-slash');
                btn.classList.add('fa-eye');
            }
        }

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const result = AUTH.login(email, password);

            if (result.success) {
                showToast('Login berhasil! Selamat datang ' + result.user.name);

                // If owner, redirect to owner panel
                if (result.isOwner) {
                    setTimeout(() => {
                        window.location.href = 'owner.html';
                    }, 1500);
                } else {
                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 1500);
                }
            } else {
                showToast(result.message);
            }
        });

        // Register Handler
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;

            if (password !== confirm) {
                showToast('Password tidak cocok!');
                return;
            }

            if (password.length < 6) {
                showToast('Password minimal 6 karakter!');
                return;
            }

            const result = AUTH.register(name, email, password, phone);

            if (result.success) {
                showToast('Pendaftaran berhasil! Selamat datang ' + result.user.name);
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1500);
            } else {
                showToast(result.message);
            }
        });
    </script>
</body>
</html>
